name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly OWASP dependency-check rescan — catches NVD advisories that
    # land on existing pinned deps. Mondays 06:00 UTC.
    - cron: '0 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Paths-filter detector (skill §15 BLOCKING). Doc-only PRs skip heavy jobs;
  # `code=false` cascades into the build/release/docker `if:` gates below.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read       # required by dorny/paths-filter on PR events
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # base: only set on push (skill §15e — act compatibility + PR-event annotation avoidance)
          base: ${{ github.event_name == 'push' && 'master' || '' }}
          filters: |
            code:
              - '!(**.md|docs/**|specs/**|LICENSE|.gitignore|.claudeignore|.claude/**|benchmarks/**|**.png|**.jpg|**.gif|**.svg)'
              - 'CLAUDE.md'

  # Single composite Maven job. The Makefile's `make ci` chains
  # deps -> lint -> test -> package, so splitting into separate
  # static-check / build / test jobs would re-run `mvn` three times
  # with no parallelism benefit on this code size. Uploads the shaded
  # JAR for the release + docker jobs to consume.
  build:
    needs: [changes]
    # `!failure() && !cancelled()` (skill §"Explicit if: strips the implicit
    # success check") — `success()` would be false on `changes=false` (a
    # legitimately-skipped doc-only PR), causing this job to skip too.
    if: |
      !failure() && !cancelled() &&
      (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      # mise-action caches the toolchain; Maven downloads are separate.
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('pom.xml') }}
          restore-keys: maven-

      - name: Build
        run: make ci

      # Trivy filesystem scan — vuln + secret + misconfig across pom.xml deps,
      # Dockerfile, workflow YAMLs, and source. Informational on every PR
      # (exit-code: '0') so PRs see findings without blocking the merge; the
      # tag-only docker job's Trivy IMAGE scan is the CRITICAL/HIGH gate.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
          ignore-unfixed: true
          skip-dirs: 'target,.git'

      - name: Upload shaded JAR
        # Skipped under act (env.ACT=true). act's built-in artifact server
        # implements only GitHub's v4 blob-upload protocol, so upload-artifact
        # v5+ breaks the local `make ci-run` mirror (proto decode error). The
        # upload is GitHub-platform plumbing — `make ci`/package already proves
        # the JAR exists — so skipping it under act lets us track the latest
        # action instead of pinning at v4.x. Runs normally on real GitHub.
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ldap-server-jar
          path: target/ldap-server.jar
          retention-days: 7
          if-no-files-found: error

  # OWASP dependency-check — Maven plugin invoked via fully-qualified
  # coordinate. Heavy job (~5 min warm, ~30 min cold for the NVD download),
  # so gated to tag pushes + weekly schedule + manual dispatch. The
  # `dependency-check-data` cache keeps post-cold runs fast.
  cve-check:
    needs: [build]
    if: |
      !failure() && !cancelled() && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('pom.xml') }}
          restore-keys: maven-
      # The NVD vuln DB is independent of pom.xml, so key it on the ISO week
      # (not hashFiles('pom.xml')) — a version bump must not evict the DB and
      # force a cold ~30-min fetch. The plugin tops up the delta each run, and
      # restore-keys falls back to the most recent week's DB as a warm baseline.
      - name: Compute weekly NVD cache key
        id: nvdcache
        run: echo "week=$(date -u +%Y-%V)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-db-${{ steps.nvdcache.outputs.week }}
          restore-keys: nvd-db-
      - name: OWASP dependency check
        # NVD_API_KEY is strongly recommended (without it the NVD update fails
        # under anonymous rate-limiting). OSS_INDEX_USER/OSS_INDEX_TOKEN enable
        # the Sonatype OSS Index analyzer — token auth is now mandatory, so
        # without them that analyzer is silently disabled (warning only) and
        # coverage drops to NVD-only. All three are routed through
        # ~/.m2/settings.xml server-ids by the Makefile recipe (printf + umask
        # 077); no value ever enters argv.
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          OSS_INDEX_USER: ${{ secrets.OSS_INDEX_USER }}
          OSS_INDEX_TOKEN: ${{ secrets.OSS_INDEX_TOKEN }}
        run: make cve-check
      - name: Upload CVE report
        # always() so the report uploads even when the scan step fails;
        # !env.ACT skips it under act (see "Upload shaded JAR" rationale).
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cve-report
          path: target/dependency-check-report.html
          retention-days: 14
          if-no-files-found: ignore

  # Recreate the `latest` GitHub Release with the freshly built JAR.
  # Fires on EVERY push to master and EVERY v* tag — same behavior as
  # the legacy workflow. Independent of `docker` since the multi-stage
  # Dockerfile builds from source rather than downloading the release JAR;
  # both jobs run in parallel after `build`.
  release:
    needs: [build]
    # Gate on build having actually SUCCEEDED, not merely "not failed".
    # On a doc-only push the `changes` filter skips `build`, so no
    # `ldap-server-jar` artifact is produced; `!failure()` treats that
    # skip as OK and the job would run, then fail at download-artifact
    # ("Artifact not found"). `needs.build.result == 'success'` makes
    # release skip cleanly on doc-only pushes (ci-pass treats skip as pass).
    if: |
      needs.build.result == 'success' &&
      github.event_name == 'push' && (
        github.ref == 'refs/heads/master' ||
        startsWith(github.ref, 'refs/tags/')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write       # create + replace the `latest` GitHub Release
    steps:
      - name: Download shaded JAR
        # !env.ACT for parity with the upload steps — download-artifact v5+
        # speaks the same blob protocol act's built-in artifact server can't
        # serve. release is push-to-master/tag-gated (won't run under act on a
        # feature branch), but this keeps all artifact steps consistent.
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ldap-server-jar

      - name: Recreate `latest` release with the fresh JAR
        # softprops/action-gh-release replaces the deprecated
        # actions/create-release + actions/upload-release-asset combo.
        # `make_latest: true` + `tag_name: latest` overwrites the
        # existing `latest` release and its assets — the same outcome
        # the legacy delete-then-recreate sequence produced.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: latest
          name: Latest
          draft: false
          prerelease: false
          make_latest: 'true'
          files: ldap-server.jar

  # Build + push the Docker image to GHCR on v* tag pushes only
  # (preserves legacy behavior). The multi-stage Dockerfile builds the JAR
  # from source — no dependency on the `release` job's GH Release upload.
  # Pre-push gates: Trivy image scan (CRITICAL/HIGH blocking) + smoke test
  # via `make image-smoke-test` (HEALTHCHECK must report healthy) + `make e2e`
  # (LDAP bind + uid search via the protocol).
  docker:
    needs: [build]
    if: |
      !failure() && !cancelled() &&
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write          # required to publish to ghcr.io via GITHUB_TOKEN
      id-token: write          # cosign keyless OIDC signing (Sigstore/Fulcio + Rekor)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          # Repo-namespace GHCR path (ghcr.io/<owner>/<repo>/<pkg>) — required
          # for `GITHUB_TOKEN` to publish (user-namespace `ghcr.io/<owner>/<pkg>`
          # requires a PAT with write:packages). metadata-action lowercases the
          # produced tags automatically — `github.repository` preserves case
          # but the output tags are all lowercase.
          images: ghcr.io/${{ github.repository }}/apacheds-ad
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          # `flavor: latest=true` applies `:latest` only to the highest-precedence
          # semver tag pushed (skill rule). `type=raw,value=latest` (the legacy
          # form) would retag `:latest` on every push including a patch against
          # an older major — wrong direction for `:latest`.
          flavor: |
            latest=true

      # ---- GATE 1: build single-arch into the local daemon for scanning
      - name: Build image for scan
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: apacheds-ad:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- GATE 2: Trivy image scan (CRITICAL/HIGH blocking)
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'apacheds-ad:scan'
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      # ---- GATE 3: smoke test — boot the image, wait for HEALTHCHECK = healthy
      - name: Smoke test
        run: make image-smoke-test IMAGE_REF=apacheds-ad:scan

      # ---- GATE 4: protocol-level e2e — boot the image, override CMD so
      # the server loads bundled `ldap-example.ldif`, then run
      # `AuthenticateWithSearch` from the SAME shaded JAR as the client over
      # a docker network. Verifies LDAP bind + subtree search end-to-end.
      - name: E2E (LDAP bind + search)
        run: make e2e IMAGE_REF=apacheds-ad:scan

      # ---- All gates passed: log in + push (second build = ~full cache hit)
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # provenance/sbom stay false ON THE IMAGE INDEX so the GHCR "OS/Arch"
          # tab renders (in-manifest attestations add unknown/unknown entries).
          # Supply-chain metadata is attached as separate cosign signature +
          # SBOM attestation artifacts below — they don't pollute the index.
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Supply-chain: cosign keyless OIDC signature + SBOM attestation,
      # both bound to the immutable pushed digest. Stored as separate
      # `.sig` / `.att` OCI artifacts (NOT in the image index), so the
      # GHCR OS/Arch tab stays clean. Verify locally:
      #   cosign verify ghcr.io/<owner>/<repo>/apacheds-ad:<tag> \
      #     --certificate-identity-regexp 'https://github.com/<owner>/<repo>/.github/workflows/build-test-push.yml@refs/tags/v.*' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Lowercase image ref
        id: img
        run: echo "ref=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/apacheds-ad" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless OIDC)
        env:
          REF: ${{ steps.img.outputs.ref }}@${{ steps.push.outputs.digest }}
        run: cosign sign --yes "$REF"

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.img.outputs.ref }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM (keyless OIDC)
        env:
          REF: ${{ steps.img.outputs.ref }}@${{ steps.push.outputs.digest }}
        run: cosign attest --yes --predicate sbom.spdx.json --type spdxjson "$REF"

  # Single branch-protection check that aggregates the per-job results.
  # Treats `skipped` as pass (doc-only PRs, master pushes that don't fire
  # docker, etc.) and only fails on `failure` or `cancelled`.
  ci-pass:
    if: always()
    needs: [changes, build, cve-check, release, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify all jobs passed (or skipped)
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs were cancelled"
            exit 1
          fi
          echo "All required jobs passed or were skipped."
